name: Test and deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  quality-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pages: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Validate and build
        run: npm run check:syntax && npm run validate && npm run build && npm run check:budget
      - name: Test the exact deployment artifact
        run: npm run test:e2e
        env:
          TEST_SITE_DIR: dist
      - name: Test source-only local edition and database migration
        run: npx playwright test --grep "local edition boots|Supabase migration defines|health monitoring"
        env:
          TEST_SITE_DIR: .
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist

  deploy:
    needs: quality-and-build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy tested artifact
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  production-smoke:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Verify production responds
        run: |
          set -euo pipefail
          expected_revision="${GITHUB_SHA:0:12}"
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent --show-error --location --max-time 20 https://vault.st-dba.com/ >/dev/null \
              && build_info="$(curl --fail --silent --show-error --location --max-time 20 https://vault.st-dba.com/build-info.json)"; then
              if printf '%s' "$build_info" | grep --fixed-strings --quiet "\"revision\": \"$expected_revision\""; then
                printf '%s\n' "$build_info"
                exit 0
              fi
            fi
            sleep 10
          done
          exit 1
