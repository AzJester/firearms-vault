name: Supabase health and privacy check

on:
  schedule:
    - cron: '17 9 */3 * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  database-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
      - name: Verify reachability, anonymous privacy, and optional authenticated canary
        env:
          CANARY_EMAIL: ${{ secrets.SUPABASE_CANARY_EMAIL }}
          CANARY_PASSWORD: ${{ secrets.SUPABASE_CANARY_PASSWORD }}
        run: node scripts/check-supabase-health.mjs
