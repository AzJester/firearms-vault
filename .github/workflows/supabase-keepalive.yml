name: Supabase health and privacy check

on:
  schedule:
    - cron: '17 9 */3 * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  database-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
      - name: Verify reachability, anonymous privacy, and optional authenticated canary
        env:
          CANARY_EMAIL: ${{ secrets.SUPABASE_CANARY_EMAIL }}
          CANARY_PASSWORD: ${{ secrets.SUPABASE_CANARY_PASSWORD }}
        run: node scripts/check-supabase-health.mjs
