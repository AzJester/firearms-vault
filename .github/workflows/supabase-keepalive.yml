name: Supabase health and privacy check

on:
  schedule:
    - cron: '17 9 * * *'
    - cron: '43 10 1 * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  database-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
      - name: Keep project reachable and verify anonymous privacy
        env:
          HEALTH_CHECK_MODE: basic
        run: node scripts/check-supabase-health.mjs
      - name: Verify reachability, privacy, database writes, and private Storage
        env:
          HEALTH_CHECK_MODE: production
          CANARY_EMAIL: ${{ secrets.SUPABASE_CANARY_EMAIL }}
          CANARY_PASSWORD: ${{ secrets.SUPABASE_CANARY_PASSWORD }}
          CANARY_STORAGE_BUCKET: media
        run: node scripts/check-supabase-health.mjs

  repository-activity-heartbeat:
    if: github.event_name == 'schedule' && github.event.schedule == '43 10 1 * *'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Refresh the public-repository activity marker
        shell: bash
        run: |
          git config user.name "firearms-vault-monitor[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          date -u +'%Y-%m-%dT%H:%M:%SZ' > .github/supabase-monitor-heartbeat
          git add .github/supabase-monitor-heartbeat
          git commit -m "chore: refresh Supabase monitor heartbeat [skip ci]"
          git push origin HEAD:main
